name: belight_bible
description: "Leia, destaque e anote a Bíblia em Português. Várias traduções disponíveis, planos de leitura, devocionais diários, estudo com IA e sincronização entre dispositivos. Funciona offline."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.10.3
  share_plus: ^7.2.1
  http: ^1.5.0
  flutter_markdown: ^0.7.2
  scrollable_positioned_list: ^0.3.8
  hive_flutter: ^1.1.0
  dio: ^5.4.0
  path_provider: ^2.1.2
  flutter_quill: ^11.5.0
  flutter_localizations:
    sdk: flutter
  graphview: ^1.2.0
  flutter_riverpod: ^2.6.1
  equatable: ^2.0.5
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  intl: ^0.20.2
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/google_logo.png
    - assets/bible/acf.json
    - assets/bible/arc.json
    - assets/bible/ntlh.json